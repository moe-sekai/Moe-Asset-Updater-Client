client:
  # Docker Compose: http://server:8080
  # Local debug:    http://127.0.0.1:8080
  server_url: "http://server:8080"
  bearer_token: "${MOE_ASSET_TOKEN}"
  user_agent: "MoeInternal/AssetClient"
  timeout_seconds: 21600

worker:
  # Leave empty to let server allocate a client id.
  id: ""
  name: ""
  version: ""
  # Keep this modest: each task may launch AssetStudio/ffmpeg and decode audio.
  max_tasks: 4
  heartbeat_interval_seconds: 30
  lease_wait_seconds: 30
  tags:
    role: "unpacker"
    region: "any"

workspace:
  root: "/app/work"
  cleanup: true
  keep_failed: true

tools:
  ffmpeg_path: "/usr/local/bin/ffmpeg"
  asset_studio_cli_path: "/app/assetstudio/AssetStudioCLI"

concurrency:
  download: 2
  # AssetStudio is the largest memory spike. Keep at 1 unless the container has plenty of RAM.
  asset_studio: 1
  # Post-processing can decode images/audio/video; keep low to avoid OOM.
  postprocess: 1
  acb: 2
  usm: 1
  hca: 2

diagnostics:
  # Logs heap/goroutine stats every N seconds. Set -1 to disable.
  runtime_stats_interval_seconds: 60
  # Set to e.g. "127.0.0.1:6060" to enable net/http/pprof.
  pprof_address: ""
  warn_heap_mb: 4096
  warn_goroutines: 2000

logging:
  level: "INFO"
  file: ""
